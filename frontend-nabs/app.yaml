runtime: nodejs22
service: fe-rest

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 1

handlers:
  - url: /script.js
    static_files: script.js
    upload: script\.js

  - url: /style.css
    static_files: style.css
    upload: style\.css

  - url: /.*
    static_files: index.html
    upload: index\.html
