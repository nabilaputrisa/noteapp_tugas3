runtime: nodejs22
service: notes-salsa

automatic_scalling:
  target_cpu_utilization: 0.65
  min_instance: 0
  max_instance: 1

handlers:
  - url: /script.js
    static_files: script.js
    upload: script.js

  - url: /style.css
    static_files: style.css
    upload: style.css

  - url: /.*
    static_files: index.html
    upload: index.html

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - gcloud config set app/cloud_build_timeout 1600
        gcloud app deploy fe_service/app.yaml
timeout: "1600s"

options:
  logging: CLOUD_LOGGING_ONLY

