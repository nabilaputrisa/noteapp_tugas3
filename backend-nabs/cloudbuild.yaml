steps:
  - name: 'ubuntu'
    args: ['ls', '-R']
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/tcc-be-rest", "-f", "Dockerfile","."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/tcc-be-rest"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "be-rest",
        "--image",
        "gcr.io/$PROJECT_ID/tcc-be-rest",
        "--timeout",
        "1000s",
        "--port",
        "5000",
        "--region",
        "us-central1",
        "--allow-unauthenticated",
      ]
Google Cloud Storage (butuh hak akses).
options:
  logging: CLOUD_LOGGING_ONLY