steps:
  - name: 'ubuntu'
    args: ['ls', '-R']
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/tcc-be-rest", "-f", "backend-nabs/Dockerfile","."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/tcc-be-rest"]

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      [
        "run",
        "deploy",
        "be-rest",
        "--image",
        "gcr.io/$PROJECT_ID/tcc-be-rest",
        "--timeout",
        "1000s",
        "--port",
        "5000",
        "--region",
        "us-central1",
        "--allow-unauthenticated",
        "--set-env-vars",
        "DB_HOST=34.172.113.167,DB_USER=admin,DB_PASSWORD=mypassword,DB_NAME=notes_123230002,PORT=5000",
      ]

options:
  logging: CLOUD_LOGGING_ONLY